<!DOCTYPE html>
<html lang="en">
<head>

<title>CLOZN — heavnOS</title>
<!-- heavnOS — the live app (Preact+HTM, no build step, served by the clozn server).
     ζ design system in theme.css; modules in ./modules/. Serve, don't file:// (ESM). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme.css">
</head>
<body>
<div id="root">
  <div class="empty" style="padding:80px 20px">
    <span class="mono" style="letter-spacing:.14em">CLOZN · heavnOS — warming up…</span><br><br>
    <span style="font-size:10px">If this never resolves: this app must be SERVED (open it via the
    clozn server, e.g. <span class="mono">/heavn/index.html</span>) — ES modules don't load from file://.</span>
  </div>
</div>
<script type="module">
  import { boot } from "./app.mjs";
  boot(document.getElementById("root"));
</script>
