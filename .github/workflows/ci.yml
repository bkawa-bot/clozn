name: CI

# Monorepo CPU lanes (Roadmap 0.8). Two independent gates, all CPU:
#   cpp     — the backend-free engine (scheduler + runtime), built with gcc + ctest.
#   python  — the real product suite (`tests/` + `clozn/`, 1678+ tests) as the primary gate,
#             plus the lab goldens (real tiny checkpoint) and the kernel's CPU reference.
#             GPU-only / GGML tests are out of scope here (no GPU runner).
# The seam (engine/ never links a model backend) is what makes the cpp lane fast and dependency-free.
#
# NOTE: `inspector/` is post-reorg vestigial -- it has zero tracked files at HEAD (its live code
# moved to `studio/`; its legacy Python package moved out to the separate clozn-research repo), so
# there is nothing left here to install or test. Its old CI steps were dropped, not fixed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp:
    name: engine — backend-free ctest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cmake + ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Configure + build (no ggml, no CUDA — pure C++ scheduler/runtime)
        run: cmake -S engine/core -B engine/core/build-cpu -G Ninja -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build engine/core/build-cpu
      - name: ctest (the 8 scheduler/runtime goldens)
        run: ctest --test-dir engine/core/build-cpu --output-on-failure

  python:
    name: product suite + lab goldens + kernel reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU torch + the version-pinned golden deps
        # Pinned to the environment the open-dCoder real-checkpoint goldens were generated against:
        # library drift can shift a logit enough to flip a near-tie pick (the seam's invariant 3).
        # The deterministic FakeAdapter oracle is version-independent and stays strict regardless.
        #
        # This one install also covers the product suite below: `clozn/server/config.py` puts
        # `engine/lab` on sys.path so `clozn.substrates.denoise` (imported transitively by
        # `clozn.server.app`) can `import cloze_lab` without a separate product-only dependency set.
        # Verified empirically (clean venv): pytest/numpy/torch/transformers is the full minimal set
        # for `tests/ clozn/ -q` -- no other runtime dependency is required.
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e "engine/lab[dev]"
          pip install "transformers==4.57.6" "tokenizers==0.22.2" "numpy==2.4.6"
      - name: Cache the open-dCoder checkpoint
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-open-dcoder-05b
      - name: Product suite — the real clozn CLI + server tests (primary gate)
        run: pytest tests/ clozn/ -q
      - name: Lab goldens (FakeAdapter exact + open-dCoder within epsilon; Dream/LLaDA auto-skip)
        run: pytest engine/lab/tests -q
      - name: Kernel — CPU reference parity vs the lab
        # Path fixed: the kernel moved from kernels/ to engine/kernels/ (reorg stage 5) and its test
        # file was later renamed test_reference.py -> test_confidence_select_reference.py.
        run: pytest engine/kernels/confidence_select/test_confidence_select_reference.py -q
