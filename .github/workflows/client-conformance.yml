name: Released client conformance

on:
  workflow_dispatch:
  schedule:
    - cron: "43 9 * * 1"

permissions:
  contents: read

jobs:
  open-webui:
    name: Open WebUI 0.10.2 -> Clozn OpenAI text + tool transport
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      WEBUI_AUTH: "False"
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: http://127.0.0.1:18181/v1
      OPENAI_API_KEY: local-conformance-key
      OFFLINE_MODE: "True"
      HF_HUB_OFFLINE: "1"
      DATA_DIR: ${{ runner.temp }}/open-webui-data
      CLOZN_TEST_RUNS_DIR: ${{ runner.temp }}/clozn-client-runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install the pinned released Open WebUI client
        run: |
          python -m pip install --upgrade pip
          pip install "open-webui==0.10.2"
      - name: Start deterministic Clozn gateway and released Open WebUI
        run: |
          mkdir -p "$DATA_DIR" "$CLOZN_TEST_RUNS_DIR" client-logs
          python -m tests.clients.fake_gateway --port 18181 >client-logs/clozn.log 2>&1 &
          echo $! > client-logs/clozn.pid
          open-webui serve --port 3000 >client-logs/open-webui.log 2>&1 &
          echo $! > client-logs/open-webui.pid
          for i in $(seq 1 180); do
            curl --fail --silent http://127.0.0.1:18181/healthz >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000/health >/dev/null \
              && exit 0
            sleep 1
          done
          cat client-logs/clozn.log client-logs/open-webui.log
          exit 1
      # This invokes the released Open WebUI server for model discovery, plain
      # text (both delivery modes), and a complete caller-managed OpenAI tool
      # continuation. The deterministic external gateway validates transport;
      # it does not qualify a real model's tool parser or renderer.
      - name: Exercise discovery, text, streaming, and tool continuation
        run: python tests/clients/openwebui-probe.py --base-url http://127.0.0.1:3000
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: released-client-conformance-${{ github.run_id }}
          if-no-files-found: ignore
          path: client-logs
      - name: Stop background processes
        if: always()
        run: |
          test ! -f client-logs/open-webui.pid || kill "$(cat client-logs/open-webui.pid)" || true
          test ! -f client-logs/clozn.pid || kill "$(cat client-logs/clozn.pid)" || true
