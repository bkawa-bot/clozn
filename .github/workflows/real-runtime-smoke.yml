name: Real runtime smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

concurrency:
  group: real-runtime-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  MODEL_REVISION: df5bf01389a39c743ab467d734bf501681e041c5
  MODEL_FILE: qwen2.5-0.5b-instruct-q4_k_m.gguf
  MODEL_SHA256: 74a4da8c9fdbcd15bd1f6d01d621410d31c6fc00986f5eb687824e7b93d7a9db

jobs:
  linux-cpu:
    name: pinned worker + real GGUF (Linux CPU)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # The `runner` context is only in scope inside jobs.<job_id>.steps.* (run/env/with/if/...),
      # NOT in a job-level `env:` block -- GitHub's Actions schema validator rejects a workflow that
      # references it there at PARSE time, before any job is created, which is exactly the "failed
      # run with zero jobs" signature this step exists to fix. Route MODEL_PATH through $GITHUB_ENV
      # instead so every later step in this job still sees it as a plain env var.
      - name: Resolve the model cache path
        run: echo "MODEL_PATH=${{ runner.temp }}/clozn-models/${{ env.MODEL_FILE }}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # This job sets up Python but never installed anything into it, so every run died at the P0
      # contracts step with `ModuleNotFoundError: No module named 'numpy'`: importing
      # `clozn.server.app` pulls in `clozn/server/routes/readouts.py`, which imports numpy at module
      # scope. That is not a dependency leak to fix in the product -- numpy IS the sanctioned
      # product-minimal dependency (see ci.yml's product-minimal lane, which installs exactly this and
      # deliberately no torch/transformers/lab). Pinned to the same version as ci.yml so the two lanes
      # can never disagree about what "product-minimal" means.
      - name: Install product-minimal Python deps (numpy only; NO torch/transformers/lab)
        run: |
          python -m pip install --upgrade pip
          pip install "numpy==2.4.6"

      - name: Install CPU build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ curl

      - name: Cache the pinned acceptance model
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/clozn-models
          key: qwen2.5-0.5b-instruct-q4-k-m-${{ env.MODEL_SHA256 }}

      - name: Download and verify the acceptance model
        run: |
          mkdir -p "$(dirname "$MODEL_PATH")"
          if [[ ! -f "$MODEL_PATH" ]]; then
            curl --fail --location --retry 3 \
              --output "$MODEL_PATH" \
              "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/${MODEL_REVISION}/${MODEL_FILE}?download=true"
          fi
          echo "${MODEL_SHA256}  ${MODEL_PATH}" | sha256sum --check

      - name: Reconstruct the pinned llama.cpp source
        run: python engine/core/third_party/bootstrap_llama.py

      - name: Build the real CPU worker
        run: |
          cmake -S engine/core -B engine/core/build-serve -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCLOZE_BUILD_GGML=ON \
            -DCLOZE_BUILD_SERVE=ON \
            -DGGML_CUDA=OFF
          cmake --build engine/core/build-serve --target cloze-server -j 2

      - name: Run the P0 model-free contracts
        run: python -m unittest -v tests.test_runtime_architecture tests.test_product_smoke

      - name: Run real CPU smoke
        run: |
          mkdir -p smoke-logs
          set -o pipefail
          python -m clozn smoke "$MODEL_PATH" --cpu --json \
            --timeout 300 --startup-timeout 240 | tee smoke-logs/smoke.json

      - name: Run real CPU deep smoke
        run: |
          set -o pipefail
          python -m clozn smoke "$MODEL_PATH" --cpu --deep --json \
            --timeout 300 --startup-timeout 240 | tee smoke-logs/smoke-deep.json

      - name: Verify process cleanup
        if: always()
        run: |
          mkdir -p smoke-logs
          python -m clozn ps | tee smoke-logs/clozn-ps.txt
          if pgrep -af 'cloze-server|clozn\.server\.app|python.*-m clozn serve' \
              > smoke-logs/residual-processes.txt; then
            cat smoke-logs/residual-processes.txt
            pkill -TERM -f 'cloze-server|clozn\.server\.app|python.*-m clozn serve' || true
            exit 1
          fi
          echo "No Clozn process remains." | tee smoke-logs/residual-processes.txt

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-runtime-smoke-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            smoke-logs
            ~/.clozn/worker.log
            ~/.clozn/gateway.log
