<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clozn · studio</title>
<link rel="stylesheet" href="clozn.css">
<style>
  /* Studio shell layout + page styles. Palette + shared components (panel, button, nav, chat
     bubble, memory card, answer card) come from clozn.css -- this file only adds the shell frame
     (sidebar + scrolling view) and the Agent/Runs page-specific bits. No redesign. */
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    height:100vh;overflow:hidden}
  #app{display:flex;height:100vh}

  /* ---- sidebar (the IA) ---- */
  #sidebar{width:214px;flex:none;display:flex;flex-direction:column;gap:2px;
    padding:20px 14px 16px;border-right:1px solid var(--line);
    background:rgba(255,255,255,.55);backdrop-filter:blur(12px)}
  #sidebar .brand{display:flex;align-items:baseline;gap:7px;padding:2px 8px}
  #sidebar .logo{font-weight:800;font-size:20px;letter-spacing:.2px;
    background:linear-gradient(90deg,var(--halo),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  #sidebar .studioword{font-size:13px;color:var(--faint);font-weight:600}
  #sidebar .brandsub{font-size:11px;color:var(--faint);padding:0 8px 14px;letter-spacing:.02em}
  #nav{display:flex;flex-direction:column;gap:2px}
  #nav a{display:block;text-decoration:none;color:var(--soft);font-size:14px;font-weight:560;
    padding:9px 12px;border-radius:11px;transition:background .16s,color .16s}
  #nav a:hover{background:rgba(122,167,255,.10);color:var(--ink)}
  #nav a.here{background:linear-gradient(90deg,rgba(122,167,255,.18),rgba(79,195,214,.12));
    color:var(--ink);font-weight:680;box-shadow:inset 0 0 0 1px rgba(122,167,255,.22)}
  .sidefoot{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding:12px 10px 0;border-top:1px solid var(--line)}
  .sidelink{font-size:12px;color:var(--faint);text-decoration:none}
  .sidelink:hover{color:var(--halo)}

  /* ---- main scroll view ---- */
  #view{flex:1;min-width:0;overflow:auto}
  #view .wrap{max-width:1120px;margin:0 auto;padding:30px 34px 70px}
  #view h1{font-size:26px}
  code{font:12.5px/1.5 ui-monospace,"Cascadia Code",Consolas,monospace;
    background:rgba(122,167,255,.10);border:1px solid var(--line);border-radius:7px;padding:1px 7px;color:#3b485a}

  /* ---- Agent page ---- */
  .agentgrid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:20px;margin-top:22px}
  @media (max-width:920px){.agentgrid{grid-template-columns:1fr}}
  .statuscard,.testcard{padding:0 0 16px}
  .srows{padding:6px 18px 4px}
  .srow{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .srow:last-child{border-bottom:none}
  .slabel{color:var(--faint);font-size:13px;flex:none}
  .sval-wrap{display:flex;align-items:center;gap:7px;text-align:right;justify-content:flex-end;flex-wrap:wrap}
  .sval{color:var(--ink);font-size:13.5px;font-weight:560;word-break:break-word}
  .sval.mono{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:12.5px;font-weight:500;color:#3b485a}
  .sval.faintv,.faintv{color:var(--faint);font-weight:400;font-style:italic}
  .sdot{width:8px;height:8px;border-radius:50%;flex:none}
  .sdot.ok{background:radial-gradient(circle at 35% 30%,#fff,var(--good));box-shadow:0 0 8px var(--good)}
  .sdot.idle{background:var(--mask)}
  .sdot.off{background:radial-gradient(circle at 35% 30%,#fff,var(--warm));box-shadow:0 0 8px var(--warm)}
  .chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .chip{font-size:11.5px;padding:2px 9px;border-radius:11px;white-space:nowrap}
  .chip.steer{background:rgba(122,167,255,.14);border:1px solid rgba(122,167,255,.30);color:var(--soft)}
  .cardactions{display:flex;gap:9px;flex-wrap:wrap;padding:12px 18px 2px}
  .cardhint{color:var(--faint);font-size:12.5px;margin:2px 18px 10px;line-height:1.45}
  .testinput{width:calc(100% - 36px);margin:0 18px;border:1px solid var(--line);border-radius:13px;
    padding:11px 13px;font:inherit;font-size:14px;background:#fff;outline:none;resize:vertical;color:var(--ink)}
  .testinput:focus{border-color:var(--halo);box-shadow:0 0 0 3px rgba(122,167,255,.13)}
  .testout{padding:4px 18px 0}
  .testout .who{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:8px 0 3px}
  .testreply{background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:13px;
    padding:11px 13px;white-space:pre-wrap;font-size:14px;color:var(--ink)}
  .notewarn{margin:12px 0 0;padding:10px 12px;border-radius:11px;font-size:12.5px;color:#8a5a2a;
    background:rgba(230,196,120,.14);border:1px solid rgba(230,196,120,.4)}

  /* ---- Runs page ---- */
  .runshead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:18px 0 12px}
  .filterlabel{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 4px 0 8px}
  .filterlabel:first-child{margin-left:0}
  .fchip{font:inherit;font-size:12.5px;border:1px solid var(--line);background:rgba(255,255,255,.7);
    color:var(--soft);border-radius:16px;padding:5px 12px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .fchip:hover{color:var(--ink);border-color:var(--halo)}
  .fchip.on{background:linear-gradient(90deg,rgba(122,167,255,.20),rgba(79,195,214,.14));
    color:var(--ink);border-color:rgba(122,167,255,.4);font-weight:620}
  .runlist{padding:6px 6px;overflow:hidden}
  .runloading,.runempty{padding:34px 20px;text-align:center;color:var(--faint)}
  .runempty-t{font-size:15px;color:var(--soft);margin-bottom:6px}
  .runempty-s{font-size:13px;max-width:520px;margin:0 auto;line-height:1.5}
  .runrow{display:grid;grid-template-columns:78px 128px minmax(0,1fr) 116px 150px 66px auto;
    align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;
    border:1px solid transparent;transition:background .14s,border-color .14s,box-shadow .14s}
  .runrow:hover{background:rgba(122,167,255,.07);border-color:rgba(122,167,255,.22);box-shadow:0 3px 14px rgba(120,150,210,.09)}
  .runrow:focus{outline:none;background:rgba(122,167,255,.09);border-color:rgba(122,167,255,.35)}
  .runrow + .runrow{margin-top:2px}
  .rc{min-width:0}
  .rc-time{display:flex;flex-direction:column;line-height:1.25}
  .rtime{font-size:13px;font-weight:620;color:var(--ink)}
  .rdate{font-size:10.5px;color:var(--faint)}
  .rsource{display:block;font-size:12.5px;font-weight:600;color:var(--soft)}
  .rclient{display:block;font-size:10.5px;color:var(--faint)}
  .rprompt{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);font-size:13.5px}
  .rmem{font-size:12px;color:var(--faint)}
  .rmem.on{color:var(--soft);background:rgba(231,168,196,.14);border:1px solid rgba(231,168,196,.34);border-radius:10px;padding:1px 8px}
  .rdial{font-size:11px;color:var(--soft);background:rgba(122,167,255,.12);border:1px solid rgba(122,167,255,.26);
    border-radius:9px;padding:1px 7px;margin:1px 3px 1px 0;display:inline-block;white-space:nowrap}
  .rdial.more{background:none;border-color:var(--line);color:var(--faint)}
  .rc-dur{font-size:12px;color:var(--faint);text-align:right;font-family:ui-monospace,Consolas,monospace}
  .rc-flags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
  .rflag{font-size:10px;letter-spacing:.02em;padding:2px 7px;border-radius:9px;white-space:nowrap;font-weight:600}
  .f-memory{background:rgba(231,168,196,.16);border:1px solid rgba(231,168,196,.4);color:#b06a8a}
  .f-steered{background:rgba(122,167,255,.14);border:1px solid rgba(122,167,255,.34);color:#5a78c0}
  .f-pending{background:rgba(230,196,120,.16);border:1px solid rgba(230,196,120,.42);color:#a9762a}
  .f-low{background:rgba(230,196,120,.16);border:1px solid rgba(230,196,120,.42);color:#a9762a}
  .f-replay{background:rgba(79,195,214,.14);border:1px solid rgba(79,195,214,.36);color:#2f97a8}
  .f-error{background:rgba(231,120,120,.14);border:1px solid rgba(231,120,120,.4);color:#c0504a}
  .f-long{background:rgba(120,140,190,.10);border:1px solid var(--line);color:var(--faint)}

  /* ---- stub pages (Memory / Behavior / Lab / Settings / Run) ---- */
  .stubnote{margin:18px 0 16px;padding:12px 15px;border-radius:13px;font-size:13px;color:var(--soft);
    background:rgba(122,167,255,.08);border:1px solid var(--line);line-height:1.5}
  .stubnote a{color:var(--halo);text-decoration:none;font-weight:600}
  .stubnote a:hover{text-decoration:underline}
  .cs-badge{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
    color:var(--cyan);background:rgba(79,195,214,.12);border:1px solid rgba(79,195,214,.34);border-radius:9px;padding:2px 8px;margin-right:8px}
  .comingsoon{text-align:center;max-width:560px;margin:0 auto;padding:14px 0}
  .embed{width:100%;height:calc(100vh - 250px);min-height:420px;border:1px solid var(--line);border-radius:16px;
    background:#fff;box-shadow:0 10px 34px rgba(120,150,210,.10)}
  .labgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:8px}
  .labtool{display:block;text-decoration:none;padding:16px 17px;border-radius:15px;border:1px solid var(--line);
    background:rgba(255,255,255,.7);transition:transform .15s,box-shadow .2s,border-color .15s}
  .labtool:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(120,150,210,.14);border-color:rgba(122,167,255,.3)}
  .labtool-n{font-size:15px;font-weight:660;color:var(--ink)}
  .labtool-arrow{color:var(--halo)}
  .labtool-d{font-size:12.5px;color:var(--faint);margin-top:4px;line-height:1.45}
</style>
</head>
<body>
  <div id="app"><!-- shell (sidebar + #view) is built by pages/app.js --></div>

  <!-- Router + shared helpers first, then each self-registering page module.
       Load order doesn't matter for correctness: app.js re-renders the current route as modules
       register. Paths use pages/<name>.js; the studio server resolves them by basename. -->
  <script src="pages/app.js"></script>
  <script src="pages/agent.js"></script>
  <script src="pages/runs.js"></script>
  <script src="pages/run.js"></script>
  <script src="pages/memory.js"></script>
  <script src="pages/behavior.js"></script>
  <script src="pages/lab.js"></script>
  <script src="pages/settings.js"></script>
</body>
</html>
